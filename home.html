function addToCart(poster) {
    const existing = cart.find(i => i.id === poster.id);
    if (existing) existing.qty++;
    else cart.push({ ...poster, qty: 1 });
    renderCart();
    showToast(`✓ ${poster.name} added to cart`);
}

function renderCart() {
    const container = document.getElementById('cartItems');
    const count = cart.reduce((s, i) => s + i.qty, 0);
    const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    document.getElementById('cartCount').textContent = `${count} item${count !== 1 ? 's' : ''}`;
    document.getElementById('cartTotal').textContent = total;

    if (!cart.length) {
        container.innerHTML = '<div style="padding:16px 0;text-align:center;color:var(--text-muted);font-size:0.82rem;">Cart is empty</div>';
        return;
    }

    container.innerHTML = '';
    cart.forEach((item, idx) => {
        const row = document.createElement('div');
        row.className = 'cart-item-row';
        row.innerHTML = `
            <div>
                <div class="cart-item-name">${item.name} ×${item.qty}</div>
                <div class="cart-item-sub">✦ ${item.points || 0} coins</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="cart-item-price">KSH ${item.price * item.qty}</span>
                <button class="remove-btn" data-idx="${idx}"><i class="fas fa-trash-alt"></i></button>
            </div>
        `;
        container.appendChild(row);
    });

    container.querySelectorAll('.remove-btn').forEach(btn => {
        btn.onclick = () => { cart.splice(parseInt(btn.dataset.idx), 1); renderCart(); };
    });
}

async function checkout() {
    if (!cart.length) { showToast('Your cart is empty'); return; }
    const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    const totalBasePoints = cart.reduce((s, i) => s + ((i.points || 0) * i.qty), 0);
    if (!confirm(`Total: KSH ${total}\nProceed to payment?`)) return;
    try {
        const result = await apiRequest('/order/create', {
            method: 'POST',
            body: JSON.stringify({
                items: cart.map(i => ({ ...i, type: i.itemType || 'standard' })),
                totalPrice: total,
                totalBasePoints: totalBasePoints
            })
        });
        if (result.success) {
            showToast(`✅ Order placed! ✦ +${result.coinsEarned || result.pointsEarned || 0} coins!`);
            cart = [];
            renderCart();
            loadProfile();
        } else showToast('Payment failed. Try again.');
    } catch(e) { showToast('Network error'); }
}

// ─── QR Scanner (native camera + jsQR) ───────────────────
let qrStream = null;
let qrAnimFrame = null;
let qrScanning = false;

async function startQRScanner() {
    const overlay = document.getElementById('qr-scanner-overlay');
    const video   = document.getElementById('qr-video');

    overlay.classList.add('open');
    setQRStatus('Starting camera…', false);

    try {
        qrStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = qrStream;
        await video.play();
        setQRStatus('', false);
        qrScanning = true;
        scanFrame();
    } catch (err) {
        console.error('Camera error:', err);
        if (err.name === 'NotAllowedError') {
            setQRStatus('Camera permission denied', true);
        } else {
            setQRStatus('Could not open camera', true);
        }
    }
}

function scanFrame() {
    if (!qrScanning) return;
    const video  = document.getElementById('qr-video');
    const canvas = document.getElementById('qr-canvas');

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
        });

        if (code && code.data) {
            qrScanning = false;
            cancelAnimationFrame(qrAnimFrame);
            // Flash feedback
            setQRStatus('QR detected! Processing…', false);
            // Short vibration if supported
            if (navigator.vibrate) navigator.vibrate(80);
            setTimeout(async () => {
                await closeScanner();
                await processQRCode(code.data);
            }, 400);
            return;
        }
    }
    qrAnimFrame = requestAnimationFrame(scanFrame);
}

function setQRStatus(msg, sticky) {
    const el = document.getElementById('qrScanStatus');
    if (!msg) { el.classList.remove('visible'); return; }
    el.textContent = msg;
    el.classList.add('visible');
    if (!sticky) setTimeout(() => el.classList.remove('visible'), 2500);
}

async function closeScanner() {
    qrScanning = false;
    cancelAnimationFrame(qrAnimFrame);
    if (qrStream) {
        qrStream.getTracks().forEach(t => t.stop());
        qrStream = null;
    }
    const video = document.getElementById('qr-video');
    video.srcObject = null;
    document.getElementById('qr-scanner-overlay').classList.remove('open');
}

async function processQRCode(qrData) {
    try {
        const result = await apiRequest('/scan/qr', { method: 'POST', body: JSON.stringify({ code: qrData }) });
        if (result.success) {
            showToast(result.is_golden ? `✨ GOLDEN QR! +${result.earned} coins!` : `🎉 +${result.earned} coins!`);
            loadProfile();
        } else {
            showToast(result.error || 'Invalid QR code');
        }
    } catch(e) { showToast('Network error'); }
}

// ─── Prizes Section ──────────────────────────────────────
function getWeeklyDeadline() {
    // Next Sunday midnight UTC
    const now = new Date();
    const day = now.getUTCDay(); // 0=Sun
    const daysUntilSunday = day === 0 ? 7 : 7 - day;
    const deadline = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + daysUntilSunday));
    return deadline;
}

function getMonthlyDeadline() {
    const now = new Date();
    return new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth() + 1, 1));
}

function formatCountdown(ms) {
    if (ms <= 0) return '0d 0h 0m';
    const totalSec = Math.floor(ms / 1000);
    const d = Math.floor(totalSec / 86400);
    const h = Math.floor((totalSec % 86400) / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    if (d > 0) return `${d}d ${h}h`;
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
}

function updatePrizeCountdowns() {
    const wDeadline = getWeeklyDeadline();
    const mDeadline = getMonthlyDeadline();
    const now = Date.now();
    document.getElementById('weeklyCountdown').textContent  = formatCountdown(wDeadline - now);
    document.getElementById('monthlyCountdown').textContent = formatCountdown(mDeadline - now);
}

        });

            statusEl.style.display = 'block';
            statusEl.style.background = 'rgba(52,211,153,0.12)';
            statusEl.style.border = '1px solid rgba(52,211,153,0.3)';
            statusEl.style.color = '#34D399';
            statusEl.innerHTML = '⏳ Submitted! Awaiting admin approval.';
            document.getElementById('roomTourUrl').value = '';
            setTimeout(() => document.getElementById('roomTourModal').classList.remove('open'), 3000);
        } else {
            statusEl.style.display = 'block';
            statusEl.style.background = 'rgba(255,80,80,0.1)';
            statusEl.style.border = '1px solid rgba(255,80,80,0.3)';
            statusEl.style.color = '#FF6B6B';
            statusEl.textContent = result.error || 'Submission failed';
        }
    } catch(e) { showToast('Network error'); }
    btn.textContent = 'Submit for Review';
    btn.disabled = false;
}
