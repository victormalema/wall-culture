<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Wall Culture · Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #FFE8D4 0%, #FFD9B5 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Brand Header */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B4A, #FF8E53, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .brand p {
            color: #B45A2E;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        /* Card */
        .auth-card {
            background: rgba(255, 245, 235, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 140, 80, 0.2);
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            background: #FFE8DC;
            border-radius: 60px;
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: #B45A2E;
        }
        .tab-btn.active {
            background: linear-gradient(95deg, #FF6B4A, #FF8E53);
            color: white;
            box-shadow: 0 4px 12px #FF6B4A40;
        }

        /* Forms */
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #B45A2E;
            margin-bottom: 6px;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 4px 16px;
            border: 1.5px solid #FFD1A4;
            transition: 0.2s;
        }
        .input-wrapper:focus-within {
            border-color: #FF6B4A;
            box-shadow: 0 0 0 3px #FF6B4A20;
        }
        .input-wrapper i {
            color: #FFB87A;
            font-size: 1rem;
            margin-right: 12px;
        }
        .input-wrapper input {
            flex: 1;
            border: none;
            padding: 14px 0;
            font-size: 0.9rem;
            background: transparent;
            outline: none;
            font-weight: 500;
            color: #4A2A1A;
        }
        .input-wrapper input::placeholder {
            color: #D4A574;
        }

        /* Referral Code (signup only) */
        .referral-row {
            background: #FFF0E5;
            border-radius: 60px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: #B45A2E;
        }
        .referral-row i {
            font-size: 1rem;
        }
        .referral-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4A2A1A;
        }
        .referral-row input::placeholder {
            color: #D4A574;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: linear-gradient(95deg, #FF6B4A, #FF8E53);
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px #FF6B4A60;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }

        .forgot-link {
            text-align: center;
            margin-top: 16px;
        }
        .forgot-link button {
            background: none;
            border: none;
            color: #FF8E53;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Messages */
        .message {
            margin-top: 16px;
            padding: 10px;
            border-radius: 60px;
            font-size: 0.75rem;
            text-align: center;
            display: none;
        }
        .message.error {
            background: #FFE0D6;
            color: #E85D2E;
            display: block;
        }
        .message.success {
            background: #D4EFDF;
            color: #27AE60;
            display: block;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #FFF5EE;
            border-radius: 48px;
            padding: 28px;
            max-width: 320px;
            width: 90%;
            text-align: center;
        }
        .modal-content h3 {
            color: #4A2A1A;
            margin-bottom: 12px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: 1.5px solid #FFD1A4;
            margin: 16px 0;
            outline: none;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.7rem;
            color: #C48356;
        }

        /* Loading state */
        .btn-primary.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="brand">
        <h1><i class="fas fa-palette"></i> WALL CULTURE</h1>
        <p>decorate your world · build your legacy</p>
    </div>

    <div class="auth-card">
        <!-- Tabs -->
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Sign In</button>
            <button class="tab-btn" data-tab="signup">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="auth-form active">
            <form id="loginFormElement">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="your@university.edu" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In <i class="fas fa-arrow-right"></i></button>
                <div class="forgot-link">
                    <button type="button" id="forgotBtn">Forgot password?</button>
                </div>
            </form>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="auth-form">
            <form id="signupFormElement">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupName" placeholder="Jordan Liu" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="your@university.edu" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="at least 6 characters" required>
                    </div>
                </div>
                <div class="referral-row">
                    <i class="fas fa-user-friends"></i>
                    <input type="text" id="referralCode" placeholder="Friend's referral code (optional)">
                </div>
                <button type="submit" class="btn-primary" id="signupBtn">Join Wall Culture <i class="fas fa-gem"></i></button>
            </form>
        </div>

        <div id="messageBox" class="message"></div>
    </div>
    <div class="auth-footer">
        <i class="fas fa-crown"></i> earn points · unlock posters · become campus legend
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-envelope"></i> Reset Password</h3>
        <p style="font-size: 0.8rem;">Enter your email to receive reset instructions</p>
        <input type="email" id="resetEmail" placeholder="your@university.edu">
        <button id="sendResetBtn" class="btn-primary" style="width:100%;">Send Reset Link</button>
        <button id="closeModalBtn" style="background:none; border:none; margin-top:12px; color:#B45A2E; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    // API Configuration
    const API_URL = 'https://wall-culture-3.onrender.com/api';
   
       // DOM Elements
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const tabBtns = document.querySelectorAll('.tab-btn');
    const messageBox = document.getElementById('messageBox');
    const forgotModal = document.getElementById('forgotModal');
    const forgotBtn = document.getElementById('forgotBtn');

    // Tab Switching
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                signupForm.classList.remove('active');
            } else {
                signupForm.classList.add('active');
                loginForm.classList.remove('active');
            }
            clearMessage();
        });
    });

    function showMessage(text, type = 'error') {
        messageBox.textContent = text;
        messageBox.className = `message ${type}`;
        setTimeout(() => {
            if (messageBox.className.includes(type)) {
                messageBox.style.display = 'none';
                messageBox.className = 'message';
            }
        }, 5000);
    }

    function clearMessage() {
        messageBox.style.display = 'none';
        messageBox.className = 'message';
    }

    // Store token and user data
    function storeAuthData(token, user) {
        localStorage.setItem('wall_culture_token', token);
        localStorage.setItem('wall_culture_user', JSON.stringify(user));
    }

    // Redirect to dashboard
    function redirectToDashboard() {
        window.location.href = 'dashboard.html'; // Change to your main app page
    }

    // LOGIN
    document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showMessage('Please fill in all fields');
            return;
        }

        const btn = document.getElementById('loginBtn');
        btn.classList.add('loading');
        btn.disabled = true;

        try {
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                storeAuthData(data.token, data.user);
                showMessage(`Welcome back, ${data.user.name}! Redirecting...`, 'success');
                setTimeout(() => redirectToDashboard(), 1500);
            } else {
                showMessage(data.error || 'Login failed');
            }
        } catch (error) {
            console.error('Login error:', error);
            showMessage('Cannot connect to server. Is the backend running?');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });

    // SIGNUP
    document.getElementById('signupFormElement').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const referralCode = document.getElementById('referralCode').value.trim();
        
        if (!name || !email || !password) {
            showMessage('Please fill in all required fields');
            return;
        }
        
        if (password.length < 6) {
            showMessage('Password must be at least 6 characters');
            return;
        }

        const btn = document.getElementById('signupBtn');
        btn.classList.add('loading');
        btn.disabled = true;

        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name, 
                    email, 
                    password, 
                    referralCode: referralCode || null 
                })
            });

            const data = await response.json();

            if (response.ok) {
                storeAuthData(data.token, data.user);
                showMessage(`Welcome to Wall Culture, ${name}! You earned 100 bonus points.`, 'success');
                setTimeout(() => redirectToDashboard(), 1500);
            } else {
                showMessage(data.error || 'Registration failed');
            }
        } catch (error) {
            console.error('Signup error:', error);
            showMessage('Cannot connect to server. Please try again.');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    });

    // Forgot Password Modal
    forgotBtn.addEventListener('click', () => {
        forgotModal.style.display = 'flex';
    });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
        forgotModal.style.display = 'none';
    });

    document.getElementById('sendResetBtn').addEventListener('click', async () => {
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) {
            alert('Please enter your email');
            return;
        }
        
        // For now, show demo message (you can implement actual reset later)
        alert(`Password reset link sent to ${email} (demo mode - check console)`);
        forgotModal.style.display = 'none';
        document.getElementById('resetEmail').value = '';
        
        // In production, you'd call:
        // await fetch(`${API_URL}/auth/forgot-password`, { method: 'POST', body: JSON.stringify({ email }) })
    });

    // Close modal when clicking outside
    forgotModal.addEventListener('click', (e) => {
        if (e.target === forgotModal) {
            forgotModal.style.display = 'none';
        }
    });

    // Check if already logged in
    function checkExistingSession() {
        const token = localStorage.getItem('wall_culture_token');
        if (token && window.location.pathname.includes('auth.html') === false) {
            // Redirect to dashboard if on auth page and already logged in
            if (window.location.pathname.includes('auth') || window.location.pathname === '/' || window.location.pathname === '/index.html') {
                redirectToDashboard();
            }
        }
    }
    
    // Demo mode - if backend not running, show demo credentials
    window.demoCredentials = {
        email: 'demo@wallculture.com',
        password: 'demo123'
    };
    
    // Add demo hint
    const demoHint = document.createElement('div');
    demoHint.style.textAlign = 'center';
    demoHint.style.marginTop = '16px';
    demoHint.style.fontSize = '0.7rem';
    demoHint.style.color = '#C48356';
    demoHint.innerHTML = '<i class="fas fa-flask"></i> Demo: demo@wallculture.com / demo123';
    document.querySelector('.auth-card').appendChild(demoHint);
</script>
</body>
</html>
