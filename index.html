<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Wall Culture · Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #FFE8D4 0%, #FFD9B5 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container { max-width: 400px; width: 100%; margin: 0 auto; }

        .brand { text-align: center; margin-bottom: 32px; }
        .brand h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF6B4A, #FF8E53, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .brand p { color: #B45A2E; font-size: 0.85rem; margin-top: 6px; }

        .auth-card {
            background: rgba(255, 245, 235, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 32px 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), 0 0 0 1px rgba(255, 140, 80, 0.2);
        }

        .auth-tabs {
            display: flex; gap: 12px; margin-bottom: 28px;
            background: #FFE8DC; border-radius: 60px; padding: 4px;
        }
        .tab-btn {
            flex: 1; background: transparent; border: none;
            padding: 12px 0; border-radius: 60px; font-weight: 700;
            font-size: 0.9rem; cursor: pointer; transition: 0.2s; color: #B45A2E;
        }
        .tab-btn.active {
            background: linear-gradient(95deg, #FF6B4A, #FF8E53);
            color: white; box-shadow: 0 4px 12px #FF6B4A40;
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #B45A2E; margin-bottom: 6px; }
        .input-wrapper {
            display: flex; align-items: center; background: white;
            border-radius: 60px; padding: 4px 16px;
            border: 1.5px solid #FFD1A4; transition: 0.2s;
        }
        .input-wrapper:focus-within { border-color: #FF6B4A; box-shadow: 0 0 0 3px #FF6B4A20; }
        .input-wrapper i { color: #FFB87A; font-size: 1rem; margin-right: 12px; }
        .input-wrapper input {
            flex: 1; border: none; padding: 14px 0; font-size: 0.9rem;
            background: transparent; outline: none; font-weight: 500; color: #4A2A1A;
        }
        .input-wrapper input::placeholder { color: #D4A574; }

        .referral-row {
            background: #FFF0E5; border-radius: 60px; padding: 12px 16px;
            margin-bottom: 20px; display: flex; align-items: center;
            gap: 12px; font-size: 0.75rem; color: #B45A2E;
        }
        .referral-row i { font-size: 1rem; }
        .referral-row input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 0.8rem; font-weight: 500; color: #4A2A1A;
        }
        .referral-row input::placeholder { color: #D4A574; }

        .btn-primary {
            width: 100%; background: linear-gradient(95deg, #FF6B4A, #FF8E53);
            border: none; padding: 14px; border-radius: 60px;
            font-weight: 800; font-size: 0.95rem; color: white;
            cursor: pointer; transition: 0.2s; margin-top: 8px;
        }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 8px 20px #FF6B4A60; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

        .forgot-link { text-align: center; margin-top: 16px; }
        .forgot-link button {
            background: none; border: none; color: #FF8E53;
            font-size: 0.7rem; font-weight: 600; cursor: pointer; text-decoration: underline;
        }

        /* FIX: Uses visibility + opacity for toggling so inline styles can't permanently hide it */
        .message {
            margin-top: 16px; padding: 10px; border-radius: 60px;
            font-size: 0.75rem; text-align: center;
            opacity: 0; visibility: hidden; transition: opacity 0.2s;
        }
        .message.visible { opacity: 1; visibility: visible; }
        .message.error { background: #FFE0D6; color: #E85D2E; }
        .message.success { background: #D4EFDF; color: #27AE60; }

        /* Modal — uses a faux-viewport wrapper (not position:fixed) to avoid iframe collapse */
        .modal-backdrop {
            display: none; align-items: center; justify-content: center;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 1000;
        }
        .modal-backdrop.open { display: flex; }
        .modal-content {
            background: #FFF5EE; border-radius: 48px; padding: 28px;
            max-width: 320px; width: 90%; text-align: center;
        }
        .modal-content h3 { color: #4A2A1A; margin-bottom: 12px; }
        .modal-input {
            width: 100%; padding: 12px; border-radius: 60px;
            border: 1.5px solid #FFD1A4; margin: 16px 0; outline: none;
            font-family: inherit; font-size: 0.9rem;
        }
        .modal-input:focus { border-color: #FF6B4A; }

        .auth-footer { text-align: center; margin-top: 24px; font-size: 0.7rem; color: #C48356; }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="brand">
        <h1><i class="fas fa-palette"></i> WALL CULTURE</h1>
        <p>decorate your world · build your legacy</p>
    </div>

    <div class="auth-card">
        <div class="auth-tabs">
            <button class="tab-btn active" data-tab="login">Sign In</button>
            <button class="tab-btn" data-tab="signup">Create Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="auth-form active">
            <form id="loginFormElement" novalidate>
                <div class="input-group">
                    <label for="loginEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="your@university.edu" autocomplete="email" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="loginBtn">Sign In <i class="fas fa-arrow-right"></i></button>
                <div class="forgot-link">
                    <button type="button" id="forgotBtn">Forgot password?</button>
                </div>
            </form>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="auth-form">
            <form id="signupFormElement" novalidate>
                <div class="input-group">
                    <label for="signupName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupName" placeholder="Jordan Liu" autocomplete="name" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="signupEmail">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="your@university.edu" autocomplete="email" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="at least 6 characters" autocomplete="new-password" required>
                    </div>
                </div>
                <div class="referral-row">
                    <i class="fas fa-user-friends"></i>
                    <input type="text" id="referralCode" placeholder="Friend's referral code (optional)" autocomplete="off">
                </div>
                <button type="submit" class="btn-primary" id="signupBtn">Join Wall Culture <i class="fas fa-gem"></i></button>
            </form>
        </div>

        <div id="messageBox" class="message" role="alert" aria-live="polite"></div>
    </div>

    <div class="auth-footer">
        <i class="fas fa-crown"></i> earn points · unlock posters · become campus legend
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
    <div class="modal-content">
        <h3 id="resetTitle"><i class="fas fa-envelope"></i> Reset Password</h3>
        <p style="font-size: 0.8rem; color: #B45A2E;">Enter your email to receive reset instructions</p>
        <input type="email" id="resetEmail" class="modal-input" placeholder="your@university.edu" autocomplete="email">
        <button id="sendResetBtn" class="btn-primary" style="width:100%;">Send Reset Link</button>
        <button id="closeModalBtn" style="background:none; border:none; margin-top:12px; color:#B45A2E; cursor:pointer; font-size:0.85rem;">Cancel</button>
    </div>
</div>

<script>
    const API_URL = 'https://wall-culture-3.onrender.com/api';

    // ==================== REDIRECT IF ALREADY LOGGED IN ====================
    (function checkExistingSession() {
        if (localStorage.getItem('wall_culture_token')) {
            window.location.href = 'home.html';
        }
    })();

    // ==================== TAB SWITCHING ====================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
            clearMessage();
        });
    });

    // ==================== MESSAGE HELPER ====================
    // FIX: Uses class toggling only — no inline display/style overrides
    // that could permanently hide the element.
    let messageTimeout = null;
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type = 'error') {
        if (messageTimeout) clearTimeout(messageTimeout);
        messageBox.textContent = text;
        messageBox.className = 'message ' + type + ' visible';
        messageTimeout = setTimeout(() => messageBox.classList.remove('visible'), 5000);
    }

    function clearMessage() {
        if (messageTimeout) clearTimeout(messageTimeout);
        messageBox.className = 'message';
        messageBox.textContent = '';
    }

    function setLoading(btn, loading) {
        btn.disabled = loading;
        if (loading) btn.dataset.originalText = btn.innerHTML;
        btn.innerHTML = loading
            ? '<i class="fas fa-spinner fa-spin"></i> Please wait…'
            : btn.dataset.originalText;
    }

    function storeAuthData(token, user) {
        localStorage.setItem('wall_culture_token', token);
        localStorage.setItem('wall_culture_user', JSON.stringify(user));
    }

    // ==================== LOGIN ====================
    document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) { showMessage('Please fill in all fields'); return; }

        const btn = document.getElementById('loginBtn');
        setLoading(btn, true);

        try {
            const res  = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (res.ok) {
                storeAuthData(data.token, data.user);
                showMessage(`Welcome back, ${data.user.name}! Redirecting…`, 'success');
                setTimeout(() => window.location.href = 'home.html', 1500);
            } else {
                showMessage(data.error || 'Login failed. Please try again.');
            }
        } catch {
            showMessage('Network error — please check your connection and try again.');
        } finally {
            setLoading(btn, false);
        }
    });

    // ==================== SIGNUP ====================
    document.getElementById('signupFormElement').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name         = document.getElementById('signupName').value.trim();
        const email        = document.getElementById('signupEmail').value.trim();
        const password     = document.getElementById('signupPassword').value;
        const referralCode = document.getElementById('referralCode').value.trim();

        if (!name || !email || !password) { showMessage('Please fill in all required fields'); return; }
        if (password.length < 6) { showMessage('Password must be at least 6 characters'); return; }

        const btn = document.getElementById('signupBtn');
        setLoading(btn, true);

        try {
            const res  = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, referralCode: referralCode || null })
            });
            const data = await res.json();

            if (res.ok) {
                storeAuthData(data.token, data.user);
                showMessage(`Welcome to Wall Culture, ${name}! You earned 100 bonus points.`, 'success');
                setTimeout(() => window.location.href = 'home.html', 1500);
            } else {
                showMessage(data.error || 'Registration failed. Please try again.');
            }
        } catch {
            showMessage('Network error — please check your connection and try again.');
        } finally {
            setLoading(btn, false);
        }
    });

    // ==================== FORGOT PASSWORD ====================
    // FIX: Now calls the real backend reset endpoint (Supabase email reset)
    // instead of a dummy alert().
    const forgotModal = document.getElementById('forgotModal');

    document.getElementById('forgotBtn').addEventListener('click', () => {
        // Pre-fill email if the user already typed it
        const existing = document.getElementById('loginEmail').value.trim();
        if (existing) document.getElementById('resetEmail').value = existing;
        forgotModal.classList.add('open');
    });

    document.getElementById('closeModalBtn').addEventListener('click', closeResetModal);
    forgotModal.addEventListener('click', (e) => { if (e.target === forgotModal) closeResetModal(); });

    function closeResetModal() {
        forgotModal.classList.remove('open');
        document.getElementById('resetEmail').value = '';
    }

    document.getElementById('sendResetBtn').addEventListener('click', async () => {
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) { showMessage('Please enter your email'); return; }

        const btn = document.getElementById('sendResetBtn');
        setLoading(btn, true);

        try {
            const res  = await fetch(`${API_URL}/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            closeResetModal();
            showMessage(data.message || 'If that email exists, a reset link has been sent.', 'success');
        } catch {
            showMessage('Network error — please try again.');
        } finally {
            setLoading(btn, false);
        }
    });
</script>
</body>
</html>
