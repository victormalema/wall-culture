<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wall Culture · Sign In</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
/* KEEPING YOUR DESIGN EXACTLY */
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:linear-gradient(135deg,#FFE8D4 0%,#FFD9B5 100%);
font-family:'Plus Jakarta Sans',sans-serif;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.auth-container{max-width:400px;width:100%;}
.brand{text-align:center;margin-bottom:32px;}
.brand h1{
font-size:2.5rem;font-weight:800;
background:linear-gradient(135deg,#FF6B4A,#FF8E53,#FFB347);
-webkit-background-clip:text;color:transparent;
}
.brand p{color:#B45A2E;font-size:.85rem;margin-top:6px;}

.auth-card{
background:rgba(255,245,235,.95);
border-radius:48px;
padding:32px 28px;
box-shadow:0 20px 40px rgba(0,0,0,.1);
}

.auth-tabs{display:flex;gap:12px;margin-bottom:28px;background:#FFE8DC;border-radius:60px;padding:4px;}
.tab-btn{flex:1;border:none;padding:12px;border-radius:60px;font-weight:700;cursor:pointer;background:none;color:#B45A2E;}
.tab-btn.active{background:#FF6B4A;color:white;}

.auth-form{display:none;}
.auth-form.active{display:block;}

.input-group{margin-bottom:20px;}
.input-wrapper{
display:flex;align-items:center;
background:white;border-radius:60px;
padding:4px 16px;border:1.5px solid #FFD1A4;
}
.input-wrapper input{
flex:1;border:none;padding:14px 0;background:none;outline:none;
}

.btn-primary{
width:100%;
background:#FF6B4A;border:none;
padding:14px;border-radius:60px;
color:white;font-weight:800;cursor:pointer;
}

.message{
margin-top:16px;padding:10px;border-radius:60px;
font-size:.75rem;text-align:center;
opacity:0;visibility:hidden;
}
.message.visible{opacity:1;visibility:visible;}
.message.error{background:#FFE0D6;color:#E85D2E;}
.message.success{background:#D4EFDF;color:#27AE60;}

.modal{
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,.8);
display:none;justify-content:center;align-items:center;
}
.modal-content{
background:#FFF5EE;padding:28px;border-radius:48px;
width:90%;max-width:320px;text-align:center;
}
</style>
</head>

<body>

<div class="auth-container">

<div class="brand">
<h1><i class="fas fa-palette"></i> WALL CULTURE</h1>
<p>decorate your world · build your legacy</p>
</div>

<div class="auth-card">

<div class="auth-tabs">
<button class="tab-btn active" data-tab="login">Sign In</button>
<button class="tab-btn" data-tab="signup">Create Account</button>
</div>

<!-- LOGIN -->
<div id="loginForm" class="auth-form active">
<form id="loginFormElement">
<input type="email" id="loginEmail" placeholder="Email" required>
<input type="password" id="loginPassword" placeholder="Password" required>
<button class="btn-primary">Sign In</button>
<button type="button" id="forgotBtn">Forgot?</button>
</form>
</div>

<!-- SIGNUP -->
<div id="signupForm" class="auth-form">
<form id="signupFormElement">
<input type="text" id="signupName" placeholder="Name" required>
<input type="email" id="signupEmail" placeholder="Email" required>
<input type="password" id="signupPassword" placeholder="Password" required>
<button class="btn-primary">Sign Up</button>
</form>
</div>

<div id="messageBox" class="message"></div>

</div>
</div>

<!-- MODAL -->
<div id="forgotModal" class="modal">
<div class="modal-content">
<h3>Reset Password</h3>
<input type="email" id="resetEmail">
<button id="sendResetBtn" class="btn-primary">Send</button>
<button id="closeModalBtn">Cancel</button>
</div>
</div>

<script>
const API_URL = 'https://wall-culture-3.onrender.com/api';

/* ✅ FIXED REDIRECT FUNCTION */
function redirectToDashboard(){
    window.location.href = '/home.html'; // mobile-safe
}

/* ✅ SESSION CHECK FIXED */
(function(){
    const token = localStorage.getItem('wall_culture_token');
    if(token){
        redirectToDashboard();
    }
})();

/* Tabs */
document.querySelectorAll('.tab-btn').forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

document.getElementById('loginForm').classList.toggle('active',btn.dataset.tab==='login');
document.getElementById('signupForm').classList.toggle('active',btn.dataset.tab==='signup');
};
});

/* Message */
function showMessage(text,type='error'){
const box=document.getElementById('messageBox');
box.textContent=text;
box.className='message '+type+' visible';
setTimeout(()=>box.classList.remove('visible'),4000);
}

/* LOGIN */
document.getElementById('loginFormElement').onsubmit=async(e)=>{
e.preventDefault();

const email=loginEmail.value;
const password=loginPassword.value;

try{
const res=await fetch(`${API_URL}/auth/login`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,password})
});

const data=await res.json();

if(res.ok){
localStorage.setItem('wall_culture_token',data.token);
showMessage('Login success','success');
setTimeout(redirectToDashboard,1200);
}else{
showMessage(data.error || 'Login failed');
}

}catch{
showMessage('Network error');
}
};

/* SIGNUP */
document.getElementById('signupFormElement').onsubmit=async(e)=>{
e.preventDefault();

const name=signupName.value;
const email=signupEmail.value;
const password=signupPassword.value;

try{
const res=await fetch(`${API_URL}/auth/register`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({name,email,password})
});

const data=await res.json();

if(res.ok){
localStorage.setItem('wall_culture_token',data.token);
showMessage('Account created','success');
setTimeout(redirectToDashboard,1200);
}else{
showMessage(data.error || 'Signup failed');
}

}catch{
showMessage('Network error');
}
};

/* MODAL */
forgotBtn.onclick=()=>forgotModal.style.display='flex';
closeModalBtn.onclick=()=>forgotModal.style.display='none';
</script>

</body>
</html>
