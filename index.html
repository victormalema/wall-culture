<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Aura · Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF6B35;
            --accent:  #FF3CAC;
            --tertiary: #7B2FFF;
            --fourth:  #00C6FF;
            --primary-glow:   rgba(255, 107,  53, 0.40);
            --accent-glow:    rgba(255,  60, 172, 0.30);
            --tertiary-glow:  rgba(123,  47, 255, 0.30);
            --grad-fire:      linear-gradient(135deg, #FF6B35, #FF3CAC);
            --grad-text:      linear-gradient(135deg, #FF6B35 0%, #FF3CAC 50%, #7B2FFF 100%);
            --bg-base:    #07070F;
            --bg-surface: rgba(255,255,255,0.035);
            --bg-card:    rgba(255,255,255,0.055);
            --bg-glass:   rgba(255,255,255,0.075);
            --border:        rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.14);
            --border-glow:   rgba(255, 107, 53, 0.35);
            --text-primary:   #FFF8F5;
            --text-secondary: rgba(255,248,245,0.60);
            --text-muted:     rgba(255,248,245,0.32);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --font-display: 'Poppins', sans-serif;
            --font-body:    'Plus Jakarta Sans', sans-serif;
        }

        @keyframes gradientShift {
            0%   { background-position: 0%   50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0%   50%; }
        }

        @keyframes floatUp {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-5px); }
        }

        @keyframes ambientDrift {
            0%   { transform: scale(1)    rotate(0deg); }
            50%  { transform: scale(1.05) rotate(1deg); }
            100% { transform: scale(0.97) rotate(-1deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100%;
            background: var(--bg-base);
            font-family: var(--font-body);
            color: var(--text-primary);
        }

        /* ── Ambient background ── */
        .ambient-bg {
            position: fixed;
            top: -30%; left: -20%;
            width: 180%; height: 90%;
            background:
                radial-gradient(ellipse at 20% 30%, var(--primary-glow)  0%, transparent 55%),
                radial-gradient(ellipse at 80% 20%, var(--accent-glow)   0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, var(--tertiary-glow) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
            filter: blur(50px);
            animation: ambientDrift 8s ease-in-out infinite alternate;
        }

        /* ── Layout ── */
        .page-wrap {
            position: relative;
            z-index: 10;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            padding-top: max(32px, env(safe-area-inset-top, 32px));
            padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
        }

        /* ── Brand ── */
        .brand {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeIn 0.5s ease;
        }

        .logo-wrap {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--grad-fire);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 6px 24px var(--primary-glow), 0 0 0 1px rgba(255,107,53,0.3);
            animation: floatUp 3s ease-in-out infinite;
        }

        .brand h1 {
            font-family: var(--font-display);
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: var(--grad-text);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 4s ease infinite;
        }

        .brand p {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ── Auth card ── */
        .auth-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-xl);
            padding: 28px 24px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px var(--border-glow);
            animation: fadeIn 0.5s 0.1s ease both;
        }

        /* ── Tabs ── */
        .auth-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 28px;
            background: rgba(255,255,255,0.04);
            border-radius: 60px;
            padding: 4px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 11px 0;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: var(--text-secondary);
            font-family: var(--font-body);
        }

        .tab-btn.active {
            background: var(--grad-fire);
            color: white;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        /* ── Forms ── */
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.3s ease; }

        .input-group { margin-bottom: 18px; }

        .input-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 4px 18px;
            border: 1px solid var(--border-bright);
            transition: all 0.25s;
        }

        .input-wrapper:focus-within {
            border-color: var(--border-glow);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.15), 0 4px 16px rgba(255,107,53,0.1);
            background: rgba(255,107,53,0.04);
        }

        .input-wrapper i {
            color: rgba(255,107,53,0.55);
            font-size: 0.95rem;
            margin-right: 12px;
            width: 16px;
            text-align: center;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            padding: 13px 0;
            font-size: 0.9rem;
            background: transparent;
            outline: none;
            font-weight: 500;
            color: var(--text-primary);
            font-family: var(--font-body);
        }

        .input-wrapper input::placeholder { color: var(--text-muted); }

        /* ── Referral row ── */
        .referral-row {
            background: rgba(123,47,255,0.07);
            border: 1px solid rgba(123,47,255,0.2);
            border-radius: 60px;
            padding: 12px 18px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            transition: all 0.25s;
        }

        .referral-row:focus-within {
            border-color: rgba(123,47,255,0.5);
            box-shadow: 0 0 0 3px rgba(123,47,255,0.1);
        }

        .referral-row i { font-size: 0.95rem; color: rgba(123,47,255,0.7); }

        .referral-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            font-family: var(--font-body);
        }

        .referral-row input::placeholder { color: var(--text-muted); }

        /* ── Primary button ── */
        .btn-primary {
            width: 100%;
            background: var(--grad-fire);
            background-size: 200% 200%;
            border: none;
            padding: 15px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-top: 6px;
            font-family: var(--font-body);
            animation: gradientShift 4s ease infinite;
            box-shadow: 0 4px 20px var(--primary-glow);
            letter-spacing: 0.2px;
        }

        .btn-primary:hover {
            transform: scale(1.03) translateY(-1px);
            box-shadow: 0 8px 28px var(--primary-glow);
        }

        .btn-primary:active { transform: scale(0.97); }

        .btn-primary:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            animation: none;
        }

        /* ── Forgot link ── */
        .forgot-link {
            text-align: center;
            margin-top: 14px;
        }

        .forgot-link button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
            font-family: var(--font-body);
        }

        .forgot-link button:hover { color: var(--primary); }

        /* ── Message ── */
        .message {
            margin-top: 16px;
            padding: 11px 16px;
            border-radius: 60px;
            font-size: 0.78rem;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s;
        }

        .message.visible { opacity: 1; visibility: visible; }

        .message.error {
            background: rgba(255,80,80,0.12);
            border: 1px solid rgba(255,80,80,0.25);
            color: #FF7B7B;
        }

        .message.success {
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.25);
            color: #34D399;
        }

        /* ── Footer ── */
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            animation: fadeIn 0.5s 0.2s ease both;
        }

        /* ── Modal ── */
        .modal-backdrop {
            display: none;
            align-items: center;
            justify-content: center;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            z-index: 1000;
        }

        .modal-backdrop.open { display: flex; }

        .modal-content {
            background: #0D0D1A;
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-xl);
            padding: 28px 24px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px var(--border-glow);
            animation: fadeIn 0.3s ease;
        }

        .modal-content h3 {
            color: var(--text-primary);
            margin-bottom: 8px;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
        }

        .modal-content p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .modal-input {
            width: 100%;
            padding: 13px 18px;
            border-radius: 60px;
            border: 1px solid var(--border-bright);
            margin: 16px 0;
            outline: none;
            font-family: var(--font-body);
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            transition: all 0.25s;
        }

        .modal-input:focus {
            border-color: var(--border-glow);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
        }

        .modal-input::placeholder { color: var(--text-muted); }

        .modal-cancel {
            background: none;
            border: none;
            margin-top: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.82rem;
            font-family: var(--font-body);
            font-weight: 600;
            transition: color 0.2s;
        }

        .modal-cancel:hover { color: var(--text-secondary); }
        /* ── Social divider ── */
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-bright);
        }

        .auth-divider span {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── Social buttons ── */
        .social-auth-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 6px;
        }

        .btn-social {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.13);
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 0.86rem;
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            backdrop-filter: blur(10px);
            letter-spacing: 0.2px;
        }

        .btn-social:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25);
            transform: scale(1.02) translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn-social:active { transform: scale(0.97); }

        .btn-social .social-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .btn-social.google:hover { border-color: rgba(66,133,244,0.4); box-shadow: 0 6px 20px rgba(66,133,244,0.15); }
    </style>
</head>
<body>
<div class="ambient-bg"></div>

<div class="page-wrap">
    <div class="auth-container">

        <div class="brand">
            <div class="logo-wrap">
                <div class="logo-icon">✦</div>
                <h1>Aura</h1>
            </div>
            <p>decorate your world · build your legacy</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Sign In</button>
                <button class="tab-btn" data-tab="signup">Create Account</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="loginForm" class="auth-form active">
                <!-- Social Auth -->
                <div class="social-auth-group">
                    <button type="button" class="btn-social google" onclick="handleGoogleAuth()">
                        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>

                <div class="auth-divider"><span>or sign in with email</span></div>

                <form id="loginFormElement" novalidate>
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="your@university.edu" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" id="loginBtn">Sign In &nbsp;<i class="fas fa-arrow-right"></i></button>
                    <div class="forgot-link">
                        <button type="button" id="forgotBtn">Forgot password?</button>
                    </div>
                </form>
            </div>

            <!-- SIGNUP FORM -->
            <div id="signupForm" class="auth-form">
                <!-- Social Auth -->
                <div class="social-auth-group">
                    <button type="button" class="btn-social google" onclick="handleGoogleAuth()">
                        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Sign up with Google
                    </button>
                </div>

                <div class="auth-divider"><span>or create account with email</span></div>

                <form id="signupFormElement" novalidate>
                    <div class="input-group">
                        <label for="signupName">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="signupName" placeholder="Jordan Liu" autocomplete="name" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="signupEmail">Email</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="signupEmail" placeholder="your@university.edu" autocomplete="email" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="signupPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="signupPassword" placeholder="at least 6 characters" autocomplete="new-password" required>
                        </div>
                    </div>
                    <div class="referral-row">
                        <i class="fas fa-user-friends"></i>
                        <input type="text" id="referralCode" placeholder="Friend's referral code (optional)" autocomplete="off">
                    </div>
                    <button type="submit" class="btn-primary" id="signupBtn">Join Aura &nbsp;<i class="fas fa-gem"></i></button>
                </form>
            </div>

            <div id="messageBox" class="message" role="alert" aria-live="polite"></div>
        </div>

        <div class="auth-footer">
            <i class="fas fa-crown"></i> earn points · unlock posters · become campus legend
        </div>

    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
    <div class="modal-content">
        <h3 id="resetTitle"><i class="fas fa-envelope"></i> Reset Password</h3>
        <p>Enter your email to receive reset instructions</p>
        <input type="email" id="resetEmail" class="modal-input" placeholder="your@university.edu" autocomplete="email">
        <button id="sendResetBtn" class="btn-primary">Send Reset Link</button>
        <button id="closeModalBtn" class="modal-cancel">Cancel</button>
    </div>
</div>

<script>
    const API_URL = '/api';

    // ── Redirect if already logged in ────────────────────────
    (function checkExistingSession() {
        if (localStorage.getItem('aura_token')) {
            window.location.href = 'home.html';
        }
    })();

    // ── Google / Social Auth ──────────────────────────────
    function handleGoogleAuth() {
        // Show loading state on buttons
        document.querySelectorAll('.btn-social.google').forEach(btn => {
            btn.disabled = true;
            btn.innerHTML = btn.innerHTML.replace('Continue with Google', 'Redirecting…').replace('Sign up with Google', 'Redirecting…');
        });
        showMessage('Redirecting to Google sign-in…', 'success');
        setTimeout(() => {
            window.location.href = `${API_URL}/auth/google`;
        }, 600);
    }

    // Handle OAuth callback errors or token-in-URL (fallback)
    (function handleOAuthRedirect() {
        const params = new URLSearchParams(window.location.search);

        // Show error if returned from callback with ?error=
        const error = params.get('error');
        if (error) {
            const messages = {
                'oauth_failed':    'Google sign-in failed. Please try again.',
                'no_token':        'Sign-in was cancelled or token was missing.',
                'exchange_failed': 'Could not complete sign-in. Please try again.',
                'network':         'Network error during sign-in. Please try again.',
            };
            showMessage(messages[error] || 'Sign-in failed: ' + error);
            // Clean the URL
            window.history.replaceState({}, '', window.location.pathname);
            return;
        }

        // Legacy / fallback: token passed directly in query string
        const token = params.get('token');
        const user  = params.get('user');
        if (token) {
            try {
                const userData = user ? JSON.parse(decodeURIComponent(user)) : {};
                storeAuthData(token, userData);
                showMessage(`Welcome${userData.name ? ', ' + userData.name : ''}! Redirecting…`, 'success');
                setTimeout(() => window.location.href = 'home.html', 1200);
            } catch { /* ignore parse errors */ }
        }
    })();

    // ── Tab switching ─────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
            clearMessage();
        });
    });

    // ── Message helper ────────────────────────────────────────
    let messageTimeout = null;
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type = 'error') {
        if (messageTimeout) clearTimeout(messageTimeout);
        messageBox.textContent = text;
        messageBox.className = 'message ' + type + ' visible';
        messageTimeout = setTimeout(() => messageBox.classList.remove('visible'), 5000);
    }

    function clearMessage() {
        if (messageTimeout) clearTimeout(messageTimeout);
        messageBox.className = 'message';
        messageBox.textContent = '';
    }

    function setLoading(btn, loading) {
        btn.disabled = loading;
        if (loading) btn.dataset.originalText = btn.innerHTML;
        btn.innerHTML = loading
            ? '<i class="fas fa-spinner fa-spin"></i> Please wait…'
            : btn.dataset.originalText;
    }

    function storeAuthData(token, user) {
        localStorage.setItem('aura_token', token);
        localStorage.setItem('aura_user', JSON.stringify(user));
    }

    // ── Login ─────────────────────────────────────────────────
    document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) { showMessage('Please fill in all fields'); return; }

        const btn = document.getElementById('loginBtn');
        setLoading(btn, true);

        try {
            const res  = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (res.ok) {
                storeAuthData(data.token, data.user);
                showMessage(`Welcome back, ${data.user.name}! Redirecting…`, 'success');
                setTimeout(() => window.location.href = 'home.html', 1500);
            } else {
                showMessage(data.error || 'Login failed. Please try again.');
            }
        } catch {
            showMessage('Network error — please check your connection and try again.');
        } finally {
            setLoading(btn, false);
        }
    });

    // ── Signup ────────────────────────────────────────────────
    document.getElementById('signupFormElement').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name         = document.getElementById('signupName').value.trim();
        const email        = document.getElementById('signupEmail').value.trim();
        const password     = document.getElementById('signupPassword').value;
        const referralCode = document.getElementById('referralCode').value.trim();

        if (!name || !email || !password) { showMessage('Please fill in all required fields'); return; }
        if (password.length < 6) { showMessage('Password must be at least 6 characters'); return; }

        const btn = document.getElementById('signupBtn');
        setLoading(btn, true);

        try {
            const res  = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, referralCode: referralCode || null })
            });
            const data = await res.json();

            if (res.ok) {
                storeAuthData(data.token, data.user);
                showMessage(`Welcome to Aura, ${name}! You earned 100 bonus coins.`, 'success');
                setTimeout(() => window.location.href = 'home.html', 1500);
            } else {
                showMessage(data.error || 'Registration failed. Please try again.');
            }
        } catch {
            showMessage('Network error — please check your connection and try again.');
        } finally {
            setLoading(btn, false);
        }
    });

    // ── Forgot password ───────────────────────────────────────
    const forgotModal = document.getElementById('forgotModal');

    document.getElementById('forgotBtn').addEventListener('click', () => {
        const existing = document.getElementById('loginEmail').value.trim();
        if (existing) document.getElementById('resetEmail').value = existing;
        forgotModal.classList.add('open');
    });

    document.getElementById('closeModalBtn').addEventListener('click', closeResetModal);
    forgotModal.addEventListener('click', (e) => { if (e.target === forgotModal) closeResetModal(); });

    function closeResetModal() {
        forgotModal.classList.remove('open');
        document.getElementById('resetEmail').value = '';
    }
    

    document.getElementById('sendResetBtn').addEventListener('click', async () => {
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) { showMessage('Please enter your email'); return; }

        const btn = document.getElementById('sendResetBtn');
        setLoading(btn, true);

        try {
            const res  = await fetch(`${API_URL}/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            closeResetModal();
            showMessage(data.message || 'If that email exists, a reset link has been sent.', 'success');
        } catch {
            showMessage('Network error — please try again.');
        } finally {
            setLoading(btn, false);
        }
    });
</script>
</body>
</html>
